server {
    listen 44306;
    server_name pro01.mikr.us rag.cytr.us;

    client_max_body_size 10M;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Frontend — statyczne pliki React ─────────────────────────
    root /home/kwasiucionek/uodo_rag/frontend/dist;
    index index.html;

    # SPA — wszystkie ścieżki frontendu → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache dla statycznych assetów (JS/CSS z hashem w nazwie)
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── FastAPI — API i dokumentacja ─────────────────────────────
    location /api/ {
    proxy_pass         http://127.0.0.1:8503;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8503/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /developer {
        proxy_pass http://127.0.0.1:8503/developer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8503/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8503/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
